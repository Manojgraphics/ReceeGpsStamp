name: Android CI

# Build, unit-test, and statically analyse the app on every push / PR.
# (Won't run until this repo is pushed to GitHub.)
on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # assembleDebug + testDebugUnitTest fail the build on compile errors / test failures.
      # detekt is reports-only (ignoreFailures = true in app/build.gradle.kts), so it informs but never blocks.
      - name: Assemble, unit-test, detekt
        run: ./gradlew assembleDebug testDebugUnitTest detekt --stacktrace

      - name: Upload test & detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            app/build/reports/
            app/build/test-results/
          if-no-files-found: ignore
