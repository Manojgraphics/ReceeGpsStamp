<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RGS — Manager Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.17.0/dist/tabler-icons.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#FFC400; --brand-d:#B8890C; --brand-text:#1B1B1B; --sidebar:#1C1C1C;
    --yellow:#FFC400; --amber:#B8890C; --ink:#1B1B1B; --soft:#5C615F;
    --bg:#F2F3F4; --card:#FFFFFF; --line:#E4E6E8; --green:#B8890C; --red:#B3261E; --danger:#B3261E; --dark:#1C1C1C;
    --shadow:0 1px 2px rgba(15,25,35,.05); --shadow-lg:0 18px 50px rgba(15,25,35,.22); --r:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Roboto',-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  .hidden{display:none!important}
  /* Login */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(1200px 650px at 50% -15%,#16222e,#0a0f15);color:#fff;padding:20px}
  .loginbox{max-width:400px;width:100%;text-align:center;background:#ffffff0a;border:1px solid #ffffff1a;border-radius:20px;padding:42px 30px;backdrop-filter:blur(10px);box-shadow:0 30px 80px rgba(0,0,0,.45)}
  .logo{width:60px;height:60px;border-radius:15px;background:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--brand-text);margin:0 auto 16px;font-size:17px;box-shadow:0 10px 28px rgba(242,183,5,.4)}
  .gbtn{display:inline-flex;align-items:center;gap:10px;background:#fff;color:#1B1B1B;border:none;border-radius:11px;padding:13px 22px;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px;transition:transform .15s,box-shadow .15s}
  .gbtn:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(0,0,0,.35)}
  .muted{color:#ffffff8c;font-size:13.5px;line-height:1.65}
  /* Top bar */
  .topbar{height:56px;background:var(--card);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:100}
  .tb-logo{display:flex;align-items:center;gap:10px}
  .tb-ic{width:32px;height:32px;border-radius:8px;background:var(--brand);color:var(--brand-text);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px}
  .tb-name{font-size:15px;font-weight:800;letter-spacing:-.02em}
  .tb-div{width:1px;height:22px;background:var(--line);margin:0 2px}
  .tb-co{font-size:12.5px;color:var(--soft);font-weight:600}
  .tb-right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .tb-av{width:34px;height:34px;border-radius:50%;background:var(--brand);color:var(--brand-text);font-size:12.5px;font-weight:800;display:flex;align-items:center;justify-content:center}
  /* Layout + sidebar */
  .layout{display:flex;min-height:calc(100vh - 56px)}
  .sidebar{width:216px;background:var(--sidebar);flex:0 0 auto;padding:12px 0;display:flex;flex-direction:column;position:sticky;top:56px;height:calc(100vh - 56px)}
  .nav-section{padding:11px 18px 5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.32)}
  .nav-item{display:flex;align-items:center;gap:11px;padding:10px 18px;cursor:pointer;color:rgba(255,255,255,.6);font-size:13.5px;font-weight:600;position:relative;transition:all .15s}
  .nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.92)}
  .nav-item.on{background:rgba(242,183,5,.13);color:var(--brand)}
  .nav-item.on::before{content:"";position:absolute;left:0;top:6px;bottom:6px;width:3px;background:var(--brand);border-radius:0 3px 3px 0}
  .nav-ic{font-size:15px;width:20px;text-align:center;flex:0 0 auto}
  .main{flex:1;min-width:0;overflow-x:hidden;padding:22px 24px 60px}
  /* Buttons */
  .btn{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
  .btn:hover{border-color:#cdd4d9;background:#fafbfb}
  .btn.y,.btn.p{background:var(--brand);color:var(--brand-text);border:none}
  .btn.y:hover,.btn.p:hover{background:#E0A800}
  .btn.s{background:var(--card);color:var(--ink);border:1px solid var(--line)}
  /* Cards / KPI / sections */
  .grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
  .stat .v{font-size:27px;font-weight:800;letter-spacing:-.03em;line-height:1}
  .stat .l{font-size:11.5px;color:var(--soft);margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  .hero{background:var(--brand);border:none;color:var(--brand-text);box-shadow:0 8px 22px rgba(242,183,5,.28)}
  .hero .l{color:#0f1923b0}
  .sec{font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--soft);margin:22px 2px 9px;text-transform:uppercase}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap}
  th{font-size:10.5px;color:var(--soft);text-transform:uppercase;letter-spacing:.4px;font-weight:700;background:#fafbfb}
  tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:#fafbfb}
  td.wrap{white-space:normal}
  .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:800}
  .Interested{background:#FFF6DC;color:var(--brand-d)}
  .NotInterested,.Closed{background:#FBEAE5;color:var(--danger)}
  .Pending{background:#EEF0F2;color:var(--soft)}
  .filters{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:12px;align-items:center}
  select,input[type=text],input[type=date]{padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-size:13px;background:#fff;color:var(--ink);font-family:inherit;transition:border-color .15s,box-shadow .15s}
  select:focus,input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(242,183,5,.18)}
  input[type=text]{min-width:200px;flex:1}
  .photocount{cursor:pointer;color:var(--brand-d);font-weight:700}
  .tablewrap{overflow:auto;border:1px solid var(--line);border-radius:12px;background:#fff;box-shadow:var(--shadow)}
  .bar{height:7px;border-radius:50px;background:#E6E9EC;overflow:hidden}
  .bar>i{display:block;height:100%;background:var(--brand);border-radius:50px}
  #modal{position:fixed;inset:0;background:rgba(15,25,35,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(5px)}
  .modalbox{background:#fff;border-radius:16px;max-width:900px;width:100%;max-height:88vh;overflow:auto;padding:22px;box-shadow:var(--shadow-lg)}
  .pgrid{display:grid;gap:9px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));margin-top:12px}
  .pgrid img{width:100%;border-radius:10px;background:#eee}
  .loading{padding:34px;text-align:center;color:var(--soft)}
  .suInp{width:100%;padding:10px 13px;border:1px solid var(--line);border-radius:10px;font-size:13.5px;background:#fff;color:var(--ink);font-family:inherit}
  .suInp:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(242,183,5,.18)}
  .suLbl{font-size:11px;font-weight:700;letter-spacing:.4px;color:var(--soft);text-transform:uppercase;margin-bottom:6px}
  .suChips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .suChip{cursor:pointer;background:var(--bg);border:1px solid var(--line);color:var(--ink);font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:20px;white-space:nowrap;transition:all .12s}
  .suChip:hover{border-color:var(--brand);background:#FFF6DC;color:var(--brand-d)}
  .suChip.on{background:var(--brand);border-color:var(--brand);color:var(--brand-text)}
  .suChip.on::before{content:"✓ "}
  @media print{.topbar,.sidebar,.filters,.btn,#modal,#rangebar{display:none!important}.main{padding:0}.layout{display:block}}
  /* Mobile: stack the sidebar into a horizontal scrolling nav so the dashboard works on a phone. */
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(1.3)}}
  #overview .aqItem:hover{transform:translateY(-1px);border-color:var(--brand-d)!important;box-shadow:0 2px 6px rgba(0,0,0,.06)}
  #overview .ovTop:hover{background:var(--bg)}
  @media (max-width:760px){
    .topbar{padding:0 12px;gap:10px}
    .layout{flex-direction:column}
    .sidebar{width:100%;height:auto;position:static;flex-direction:row;overflow-x:auto;padding:6px 8px;gap:4px;border-bottom:1px solid var(--line)}
    .nav-section{display:none}
    .nav-item{flex:0 0 auto;white-space:nowrap;padding:8px 12px;font-size:13px}
    .nav-item.on::before{left:8px;right:8px;top:auto;bottom:0;width:auto;height:3px;border-radius:3px 3px 0 0}
    .main{padding:14px 12px 50px}
    .modalbox{max-width:94vw;padding:14px 12px}
    /* Fleet — KPI strip stacks 2-col, vehicle stat block tightens, tab bar wraps */
    #fleet .grid[style*="minmax(160px"],#fleet .grid[style*="minmax(180px"]{grid-template-columns:repeat(2,1fr)!important}
    #fleet .card{padding:13px 12px}
    .fvTab,.vTab,.mfTab,.exTab,.lbTab,.anWin{padding:6px 10px!important;font-size:11.5px!important}
    .filters{gap:6px;flex-wrap:wrap}
    /* Tables horizontal scroll already from .tablewrap */
    table th,table td{padding:8px 9px;font-size:12px}
    /* Stat blocks readability */
    .stat .v{font-size:18px}
    /* Maintenance table → card layout on phones (vehicle / item / progress / status / actions stack) */
    .maintTbl thead,.maintTbl tr>th{display:none}
    .maintTbl,.maintTbl tbody,.maintTbl tr,.maintTbl td{display:block;width:100%;box-sizing:border-box}
    .maintTbl tr{border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:10px;background:var(--card)}
    .maintTbl td{padding:5px 0;border:none}
    .maintTbl td[data-label="Vehicle"]{font-size:14px;font-weight:800;border-bottom:1px dashed var(--line);padding-bottom:7px;margin-bottom:4px}
    .maintTbl td[data-label]::before{content:attr(data-label);display:block;font-size:9.5px;font-weight:800;letter-spacing:.5px;color:var(--soft);margin-bottom:3px}
    .maintTbl td[data-label="Vehicle"]::before{display:none}
    .maintTbl td[data-label="Action"]{margin-top:5px;padding-top:8px;border-top:1px dashed var(--line)}
  }
</style>
</head>
<body>

<div id="login">
  <div class="loginbox">
    <div class="logo">RGS</div>
    <h2 style="margin:0">Manager Dashboard</h2>
    <p class="muted">Recce GPS Stamp — team overview, recces, expenses & reports.</p>
    <button class="gbtn" id="signin">
      <span style="display:inline-block;width:18px;height:18px;border-radius:50%;background:conic-gradient(#EA4335,#FBBC05,#34A853,#4285F4,#EA4335);color:#fff;font-weight:800;font-size:11px;line-height:18px">G</span>
      Sign in with Google
    </button>
    <p class="muted" id="loginmsg" style="margin-top:16px"></p>
  </div>
</div>

<div id="appui" class="hidden">
  <div class="topbar">
    <div class="tb-logo">
      <div class="tb-ic">RGS</div>
      <span class="tb-name">Recce GPS Stamp</span>
      <div class="tb-div"></div>
      <span class="tb-co" id="who"></span>
    </div>
    <div class="tb-right">
      <button class="btn" id="refresh">↻ Refresh</button>
      <div style="position:relative">
        <button class="btn" id="notifBtn" title="Notifications" style="position:relative;padding:6px 10px;font-size:16px;line-height:1">🔔<span id="notifBadge" style="display:none;position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;border-radius:50%;background:var(--danger);color:#fff;font-size:10px;font-weight:800;display:none;align-items:center;justify-content:center;padding:0 4px;line-height:1;border:2px solid var(--card)"></span></button>
        <div id="notifPanel" style="display:none;position:absolute;top:calc(100% + 8px);right:0;width:340px;max-height:480px;overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 10px 28px rgba(0,0,0,.16);z-index:200"></div>
      </div>
      <div class="tb-av" id="avatar">··</div>
    </div>
  </div>
  <div class="layout">
    <nav class="sidebar">
      <div class="nav-section">Main</div>
      <div class="nav-item on" data-tab="overview"><span class="nav-ic"><i class="ti ti-layout-dashboard"></i></span>Overview</div>
      <div class="nav-item" data-tab="leaderboard"><span class="nav-ic"><i class="ti ti-trophy"></i></span>Leaderboard</div>
      <div class="nav-item" data-tab="projects"><span class="nav-ic"><i class="ti ti-building-store"></i></span>Projects</div>
      <div class="nav-item" data-tab="setup"><span class="nav-ic"><i class="ti ti-settings"></i></span>Project Setup</div>
      <div class="nav-section">Insights</div>
      <div class="nav-item" data-tab="expenses"><span class="nav-ic"><i class="ti ti-wallet"></i></span>Expenses</div>
      <div class="nav-item" data-tab="gallery"><span class="nav-ic"><i class="ti ti-photo"></i></span>Gallery</div>
      <div class="nav-item" data-tab="analytics"><span class="nav-ic"><i class="ti ti-chart-line"></i></span>Analytics</div>
      <div class="nav-item" data-tab="map"><span class="nav-ic"><i class="ti ti-map-2"></i></span>Map</div>
      <div class="nav-item" data-tab="fleet"><span class="nav-ic"><i class="ti ti-truck"></i></span>Fleet</div>
      <div class="nav-section hidden" id="admSec">Admin</div>
      <div class="nav-item hidden" data-tab="access"><span class="nav-ic"><i class="ti ti-users"></i></span>Managers</div>
      <div style="flex:1"></div>
      <div class="nav-item" id="signout"><span class="nav-ic"><i class="ti ti-logout"></i></span>Sign out</div>
    </nav>
    <main class="main">
      <div id="rangebar" style="display:none;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:16px"></div>
      <div id="status" class="loading">Loading team data…</div>
      <div id="overview" class="tabpane"></div>
    <div id="leaderboard" class="tabpane hidden"></div>
    <div id="team" class="tabpane hidden"></div>
    <div id="projects" class="tabpane hidden"></div>
    <div id="expenses" class="tabpane hidden"></div>
    <div id="analytics" class="tabpane hidden"></div>
    <div id="map" class="tabpane hidden"></div>
    <div id="gallery" class="tabpane hidden"></div>
    <div id="fleet" class="tabpane hidden"></div>
    <div id="setup" class="tabpane hidden"></div>
    <div id="install" class="tabpane hidden"></div>
    <div id="access" class="tabpane hidden"></div>
    </main>
  </div>
</div>

<div id="modal" class="hidden"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore, collectionGroup, getDocs, doc, getDoc, setDoc, addDoc, deleteDoc, collection, query, orderBy, limit }
  from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import { getStorage, ref, getDownloadURL, uploadBytes }
  from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";
import { getFunctions, httpsCallable }
  from "https://www.gstatic.com/firebasejs/10.12.5/firebase-functions.js";

const firebaseConfig = {
  apiKey: "AIzaSyDfBgHtpt2Xo04W5NvPm2d5G7t6cSkHxUY",
  authDomain: "recee-gps-stamp.firebaseapp.com",
  projectId: "recee-gps-stamp",
  storageBucket: "recee-gps-stamp.firebasestorage.app"
};
// Owners — full control, can manage managers. Must match isAdmin() in firestore.rules.
const ADMIN_EMAILS = ["info4mediaearth@gmail.com"];

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
const functions = getFunctions(app);

const $ = s => document.querySelector(s);
const money = n => "₹" + Math.round(n||0).toLocaleString("en-IN");
const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmtDate = ms => ms ? new Date(ms).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}) : "—";
const fmtYM = y => { if(!y) return ""; const m=String(y).match(/^(\d{4})-(\d{2})$/); return m ? new Date(+m[1],+m[2]-1,1).toLocaleDateString("en-IN",{month:"short",year:"numeric"}) : String(y); }; // "2022-03"→"Mar 2022"; plain year stays
const ago = ms => { if(!ms) return "—"; const d=Date.now()-ms; if(d<3600000) return Math.max(1,Math.floor(d/60000))+"m ago"; if(d<86400000) return Math.floor(d/3600000)+"h ago"; return Math.floor(d/86400000)+"d ago"; };
const today = ()=> new Date().toISOString().slice(0,10);
const accessRef = ()=> doc(db,"config","access");

let DATA=null, ROLE=null, TARGETS={}, APPROVALS={}, INSTALL={}, DISABLED={}, HIDDEN_UIDS=new Set(); const urlCache=new Map();
let CATALOG={companies:[],distributors:[]};   // shared admin-managed catalog (for dynamic Creative/Media)
let FLEET=[];   // shared company vehicles (loaded for the Dashboard fleet card)
const apprState=(uid,eid)=>(((APPROVALS[uid]||{}).statuses||{})[eid]||{}).state||"pending";

// ── Date-range filter (global) ──
let RANGE={from:0,to:8.64e15,label:"All time"};
const inRange=ms=>{ ms=ms||0; return ms>=RANGE.from&&ms<=RANGE.to; };
const fRecces=()=>DATA.recces.filter(x=>inRange(x.date));
const fExpenses=()=>DATA.expenses.filter(x=>inRange(x.date));
const fSurveyors=()=>{ const r=fRecces(),e=fExpenses(); return DATA.surveyors.map(s=>{ const sr=r.filter(x=>x.uid===s.uid),se=e.filter(x=>x.uid===s.uid);
  return {...s, surveyed:sr.length, interested:sr.filter(x=>x.status==="Interested").length, spent:sum(se.filter(x=>x.kind==="EXPENSE"&&x.paymentMode!=="Company")), advance:sum(se.filter(x=>x.kind==="ADVANCE"))}; }); };
// Hide duplicate / stale Firebase UIDs (one user signed in twice = two accounts). Doesn't disable login — just suppresses from dashboard lists.
const isHidden=uid=>HIDDEN_UIDS.has(uid);
const fSurveyorsVisible=()=>fSurveyors().filter(s=>!isHidden(s.uid));
async function setHidden(uid,hide){ try{ if(hide) HIDDEN_UIDS.add(uid); else HIDDEN_UIDS.delete(uid); await setDoc(doc(db,"config","hidden"),{uids:[...HIDDEN_UIDS],updatedAt:Date.now()},{merge:true}); logAudit("hidden",`${hide?"Hid":"Unhid"} field user ${(((DATA&&DATA.surveyors)||[]).find(s=>s.uid===uid)||{}).name||uid}`); rerenderActive(); }catch(e){ alert("Save failed: "+(e.message||e)); } }
function startOf(unit){ const d=new Date(); d.setHours(0,0,0,0);
  if(unit==="week"){ const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); } else if(unit==="month"){ d.setDate(1); }
  return d.getTime(); }
function setRange(from,to,label){ RANGE={from,to:to||8.64e15,label}; renderRangeBar(); rerenderActive(); }
function renderRangeBar(){
  const bar=$("#rangebar"); if(!bar) return;
  const presets=[["All time",0,8.64e15],["Today",startOf("day"),8.64e15],["This week",startOf("week"),8.64e15],["This month",startOf("month"),8.64e15]];
  bar.innerHTML=`<span style="font-size:11px;color:var(--soft);font-weight:700">PERIOD</span>`+
    presets.map(([l,f,t])=>`<button class="btn ${RANGE.label===l?'y':''}" data-f="${f}" data-t="${t}" data-l="${esc(l)}">${l}</button>`).join("")+
    `<input type="date" id="rgFrom" style="padding:6px 8px;border:1px solid var(--line);border-radius:8px;font-size:12px;background:#fff">
     <input type="date" id="rgTo" style="padding:6px 8px;border:1px solid var(--line);border-radius:8px;font-size:12px;background:#fff">
     <button class="btn" id="rgGo">Apply</button>`;
  bar.querySelectorAll("button[data-l]").forEach(b=>b.onclick=()=>setRange(+b.dataset.f,+b.dataset.t,b.dataset.l));
  $("#rgGo").onclick=()=>{ const f=$("#rgFrom").value,t=$("#rgTo").value; if(!f&&!t) return;
    const from=f?new Date(f+"T00:00:00").getTime():0, to=t?new Date(t+"T23:59:59").getTime():8.64e15;
    setRange(from,to,(f||"…")+" → "+(t||"…")); };
}

// Admin: export one field user's full data (recces + expenses) as a CSV the admin can keep.
function exportSurveyor(uid){
  const s=fSurveyors().find(x=>x.uid===uid); if(!s) return;
  const r=fRecces().filter(x=>x.uid===uid).sort((a,b)=>(b.date||0)-(a.date||0));
  const e=fExpenses().filter(x=>x.uid===uid);
  const q=v=>{ const t=(v==null?"":String(v)); return /[",\n]/.test(t)?'"'+t.replace(/"/g,'""')+'"':t; };
  const rows=[["Type","Shop","City","Status","Project","Date","Photos","Lat","Lng","Amount","Category","Payment"]];
  r.forEach(x=>rows.push(["Recce",x.shop,x.city,x.status,x.project,fmtDate(x.date),x.photos?x.photos.length:0,x.lat||"",x.lng||"","","",""]));
  e.forEach(x=>rows.push([x.kind==="ADVANCE"?"Advance":"Expense","","","",x.projectName||"",fmtDate(x.date),"","","",x.amount||0,x.category||"",x.paymentMode||""]));
  const csv=rows.map(row=>row.map(q).join(",")).join("\r\n");
  const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`${(s.name||"field_user").replace(/[^a-z0-9]+/gi,"_")}_data.csv`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
}

  if(_projView==="detail" && _projSel){ renderProjectDetail(_projSel); return; }
  const recces=fRecces(), exps=fExpenses(), shops=DATA.shops||[];
  const P={}; const get=p=>P[p]||(P[p]={project:p,company:"",shops:0,surveyed:0,interested:0,spend:0,surveyors:new Set()});
  // Seed from the shared catalog so catalog-only distributors (not yet pushed to any field user) still show up.
  (CATALOG.distributors||[]).forEach(d=>{ if(d&&d.name){ const g=get(d.name); if(d.companyName)g.company=d.companyName; } });
  shops.forEach(s=>{ const g=get(s.project||"General"); g.shops++; if(s.company)g.company=s.company; if(s.surveyor)g.surveyors.add(s.surveyor); });
  recces.forEach(r=>{ const g=get(r.project||"General"); g.surveyed++; if(r.status==="Interested")g.interested++; if(r.surveyor)g.surveyors.add(r.surveyor); });
  exps.filter(x=>x.kind==="EXPENSE"&&x.paymentMode!=="Company").forEach(x=>{ get(x.projectName||"General").spend+=x.amount||0; });
  // shop-level install rollup per project (install / partial / pending sum to shops)
  const sm={}; installUnits(recces).forEach(o=>{ const p=o.r.project||"General", sid=o.r.id; (sm[p]=sm[p]||{}); const sh=sm[p][sid]=sm[p][sid]||{u:0,inst:0,prog:0}; sh.u++; if(o.fi&&o.fi.status==="Installed")sh.inst++; else if(o.fi&&o.fi.status==="InProgress")sh.prog++; });
  const roll=p=>{ const m=sm[p]||{}; let inS=0,paS=0; Object.values(m).forEach(sh=>{ if(sh.inst>0&&sh.inst===sh.u)inS++; else if(sh.inst>0||sh.prog>0)paS++; }); return {inS,paS}; };
  const distCity=name=>{ const d=(CATALOG.distributors||[]).find(x=>(x.name||"").toLowerCase()===(name||"").toLowerCase()); return (d&&d.city)||""; };
  const statusPill=p=> p>=70?["On track","#1B873F","#E8F5EC"] : p>=40?["In progress","#B8890C","#FFF6DC"] : p>=10?["Slow","#C8472E","#FBEAE5"] : ["Just started","#5C615F","#EEF0F2"];
  const list=Object.values(P).filter(g=>g.project!=="General").map(g=>{ const {inS,paS}=roll(g.project); const prog=g.shops?Math.round(inS*100/g.shops):0; return {...g,city:distCity(g.project),install:inS,partial:paS,pending:Math.max(0,g.shops-inS-paS),prog,status:statusPill(prog)}; }).sort((a,b)=>b.shops-a.shops);

  const chip=(lbl,n,key)=>`<button class="prChip" data-f="${esc(key)}" style="border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:50px;padding:6px 13px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap">${esc(lbl)} <span style="opacity:.6;font-size:11px;margin-left:2px">${n}</span></button>`;
  $("#projects").innerHTML=`

async function photoURL(uid,p){
  const i=(p||"").indexOf("/files/"); if(i<0) return null;
  const key=uid+"|"+p; if(urlCache.has(key)) return urlCache.get(key);
  try{ const u=await getDownloadURL(ref(storage,`users/${uid}/files/${p.substring(i+7)}`)); urlCache.set(key,u); return u; }catch(e){ return null; }
}

// Per-user expense ledger (khata) — advance IN / spent OUT with a running balance, period-aware.
function openLedger(uid){
  const txns=fExpenses().filter(x=>x.uid===uid).slice().sort((a,b)=>(a.date||0)-(b.date||0));
  const name=(txns.find(x=>x.surveyor)||{}).surveyor||uid;
  const adv=sum(txns.filter(x=>x.kind==="ADVANCE")), sp=sum(txns.filter(x=>x.kind==="EXPENSE"&&x.paymentMode!=="Company")), comp=sum(txns.filter(x=>x.kind==="EXPENSE"&&x.paymentMode==="Company"));
  let bal=0;
  const rows=txns.map(x=>{ const isAdv=x.kind==="ADVANCE", isComp=!isAdv&&x.paymentMode==="Company"; const inA=isAdv?(x.amount||0):0, outA=(!isAdv&&!isComp)?(x.amount||0):0; bal+=inA-outA;
    return `<tr><td>${fmtDate(x.date)}</td><td>${isAdv?"Advance":esc(x.category||"Expense")}${isComp?' <span style="color:var(--soft);font-size:11px">(company-paid)</span>':''}${x.projectName?` · <span style="color:var(--soft);font-size:11px">${esc(x.projectName)}</span>`:''}${x.note?`<br><span style="color:var(--soft);font-size:11px">${esc(x.note)}</span>`:''}</td><td style="text-align:right;color:var(--green)">${inA?money(inA):"—"}</td><td style="text-align:right;color:var(--red)">${outA?money(outA):"—"}</td><td style="text-align:right;font-weight:700">${money(bal)}</td></tr>`; }).join("");
  const m=$("#modal"); m.classList.remove("hidden");
  m.innerHTML=`<div class="modalbox">
    <h3 style="margin:0 0 2px">🧾 ${esc(name)} — Ledger</h3>
    <div style="font-size:12px;color:var(--soft);margin-bottom:10px">${esc(RANGE.label)} · Advance <b>${money(adv)}</b> · Spent <b>${money(sp)}</b> · Balance <b style="color:${adv-sp>=0?'var(--green)':'var(--red)'}">${money(Math.abs(adv-sp))} ${adv-sp>=0?"to return":"to pay"}</b>${comp?` · Company-paid ${money(comp)}`:""}</div>
    <div class="tablewrap"><table><tr><th>Date</th><th>Detail</th><th style="text-align:right">In</th><th style="text-align:right">Out</th><th style="text-align:right">Balance</th></tr>
      ${rows||`<tr><td colspan="5" style="color:var(--soft);padding:14px">No transactions in this period.</td></tr>`}
    </table></div>
    <div style="text-align:right;margin-top:12px"><button class="btn" id="ledClose">Close</button></div>
  </div>`;
  m.onclick=ev=>{ if(ev.target===m) m.classList.add("hidden"); };
  $("#ledClose").onclick=()=>m.classList.add("hidden");
}

      </div>`; }).join("")+`</div>`

// ── Analytics (Chart.js) ──
let _charts=[], _anWin=7;
function renderAnalytics(){
  _charts.forEach(c=>{ try{ c.destroy(); }catch(e){} }); _charts=[];
  const allR=DATA.recces||[];
  const iu=installUnits(allR);
  // install status mix (cumulative)
  let iInstalled=0,iPartial=0,iIssues=0,iCancelled=0;
  iu.forEach(o=>{ const st=o.fi&&o.fi.status; if(st==="Installed")iInstalled++; else if(st==="InProgress")iPartial++; else if(st==="NotDone"){ const rs=((o.fi&&o.fi.reason)||"").toLowerCase(); if(rs.includes("clos")||rs.includes("refus")||rs.includes("mov"))iCancelled++; else iIssues++; } });
  const doneTot=iInstalled+iPartial+iIssues+iCancelled;
  // installations trend (windowed by install date, fallback recce date)
  const nb=_anWin<=7?7:_anWin<=31?_anWin:13, span=_anWin<=31?86400000:7*86400000;
  const buckets=[]; { const base=new Date(); base.setHours(0,0,0,0); for(let i=nb-1;i>=0;i--) buckets.push(base.getTime()-i*span); }
  const instDone=iu.filter(o=>o.fi&&o.fi.status==="Installed");
  const dayCounts=buckets.map(t=>instDone.filter(o=>{ const at=(o.fi&&o.fi.at)||o.r.date||0; return at>=t&&at<t+span; }).length);
  const totalInst=dayCounts.reduce((a,b)=>a+b,0);
  const dayLabels=buckets.map(t=>new Date(t).toLocaleDateString("en-IN",_anWin<=7?{weekday:"short"}:{day:"2-digit",month:"short"}));
  // completion by distributor (cumulative install-shops / shops)
  const byD={}; (DATA.shops||[]).forEach(s=>{ const p=s.project||"General"; (byD[p]=byD[p]||{shops:0}).shops++; });
  const sm={}; iu.forEach(o=>{ const p=o.r.project||"General", sid=o.r.id; (sm[p]=sm[p]||{}); const sh=sm[p][sid]=sm[p][sid]||{u:0,inst:0}; sh.u++; if(o.fi&&o.fi.status==="Installed")sh.inst++; });
  const comp=Object.entries(byD).filter(([p])=>p!=="General").map(([p,v])=>{ const m=sm[p]||{}; let inS=0; Object.values(m).forEach(sh=>{ if(sh.inst>0&&sh.inst===sh.u)inS++; }); return {p,pct:v.shops?Math.round(inS*100/v.shops):0}; }).sort((a,b)=>b.pct-a.pct).slice(0,8);
  // media type split (cumulative)
  const mt={}; allR.forEach(r=>(r.media||[]).forEach(m=>{ if(m.type)mt[m.type]=(mt[m.type]||0)+(m.qty||1); }));
  const media=Object.entries(mt).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const winBtn=(n,l)=>`<button class="anWin btn ${_anWin===n?'y':''}" data-w="${n}">${l}</button>`;
  const maxComp=Math.max(1,...comp.map(c=>c.pct)), maxMedia=Math.max(1,...media.map(m=>m[1]));
  const barRow=(l,v,max,suf)=>`<div style="margin-bottom:11px"><div style="display:flex;font-size:13px;font-weight:700"><span style="flex:1">${esc(l)}</span><span style="color:var(--brand-d)">${v}${suf||""}</span></div><div class="bar" style="margin-top:5px"><i style="width:${max?Math.round(v*100/max):0}%"></i></div></div>`;
  $("#analytics").innerHTML=`
    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px">
      <div style="flex:1;min-width:140px;font-size:18px;font-weight:800">Analytics</div>
      <div class="filters" style="gap:6px">${winBtn(7,"7 days")}${winBtn(30,"30 days")}${winBtn(90,"Quarter")}</div>
    </div>
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(320px,1fr))">
      <div class="card"><div style="display:flex;align-items:center;margin-bottom:8px"><b style="font-size:14.5px">Installations</b><span style="margin-left:auto;font-size:12px;color:var(--soft)">${totalInst} total</span></div><div style="height:175px"><canvas id="cInst"></canvas></div></div>
      <div class="card"><div style="display:flex;align-items:center;margin-bottom:10px"><b style="font-size:14.5px">Install status mix</b><span style="margin-left:auto;font-size:12px;color:var(--soft)">${doneTot} units</span></div>
        <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap"><div style="position:relative;width:150px;height:150px"><canvas id="cMix"></canvas><div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none"><div style="font-size:26px;font-weight:800">${iInstalled}</div><div style="font-size:9px;letter-spacing:1px;color:var(--soft)">DONE</div></div></div>
        <div style="flex:1;min-width:130px">${[["Installed",iInstalled,"#FFC400"],["Partial",iPartial,"#E0A93B"],["Issues",iIssues,"#E08A3B"],["Cancelled",iCancelled,"#B3261E"]].map(x=>`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px"><span style="width:10px;height:10px;border-radius:3px;background:${x[2]}"></span><span style="flex:1">${x[0]}</span><b>${x[1]}</b></div>`).join("")}</div></div>
      </div>
    </div>
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(320px,1fr));margin-top:12px">
      <div class="card"><b style="font-size:14.5px">Completion by distributor</b><div style="margin-top:13px">${comp.length?comp.map(c=>barRow(c.p,c.pct,maxComp,"%")).join(""):`<div style="color:var(--soft);font-size:13px">No data.</div>`}</div></div>
      <div class="card"><b style="font-size:14.5px">Media type split</b><div style="margin-top:13px">${media.length?media.map(m=>barRow(m[0],m[1],maxMedia,"")).join(""):`<div style="color:var(--soft);font-size:13px">No data.</div>`}</div></div>
    </div>`;
  _charts.push(new Chart($("#cInst"),{type:"bar",data:{labels:dayLabels,datasets:[{data:dayCounts,backgroundColor:"#FFC400",borderRadius:6,maxBarThickness:46}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{beginAtZero:true,ticks:{precision:0}}}}}));
  _charts.push(new Chart($("#cMix"),{type:"doughnut",data:{labels:["Installed","Partial","Issues","Cancelled"],datasets:[{data:[iInstalled,iPartial,iIssues,iCancelled],backgroundColor:["#FFC400","#E0A93B","#E08A3B","#B3261E"],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:"70%",plugins:{legend:{display:false}}}}));
  document.querySelectorAll("#analytics .anWin").forEach(b=>b.onclick=()=>{ _anWin=+b.dataset.w; renderAnalytics(); });
}

// ── Map (Leaflet + OpenStreetMap) ──
let _map=null;
function renderMap(){
  const recces=fRecces().filter(x=>x.lat&&x.lng);
  const installs=(DATA.installPoints||[]).filter(x=>x.lat&&x.lng);
  const vehicles=FLEET.filter(v=>v.lat&&v.lng);
  const pendingCount=Math.max(0,(DATA.shops||[]).length-fRecces().length);
  const pts=[...installs.map(x=>({lat:x.lat,lng:x.lng,shop:x.shop,city:x.city,sub:[x.media,x.size].filter(Boolean).join(" · "),ins:true,pill:["Installed","#1B873F","#E8F5EC"]})),
    ...recces.map(x=>({lat:x.lat,lng:x.lng,shop:x.shop,city:x.city,sub:x.surveyor+" · "+fmtDate(x.date),ins:false,pill:["Recce done","#5C615F","#EEF0F2"]}))];
  const chip=(k,l,n)=>`<button class="mpChip" data-k="${k}" style="border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:50px;padding:6px 14px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap">${l}${n!=null?` <span style="opacity:.6">${n}</span>`:""}</button>`;
  $("#map").innerHTML=`
    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px">
      <div style="flex:1;min-width:150px;font-size:18px;font-weight:800">Field map</div>
      <div class="filters" id="mpChips" style="gap:7px">${chip("all","All")}${chip("ins","Installed",installs.length)}${chip("rec","Recce",recces.length)}${chip("veh","Vehicles",vehicles.length)}</div>
    </div>
    <div class="card" style="padding:0;overflow:hidden;position:relative">
      <div id="leaflet" style="height:540px"></div>
      <div style="position:absolute;top:12px;right:12px;z-index:1000;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 13px;box-shadow:var(--shadow);font-size:12.5px">
        <div style="display:flex;align-items:center;gap:7px;padding:2px 0"><span style="width:9px;height:9px;border-radius:50%;background:#FFC400"></span>Installed · <b>${installs.length}</b></div>
        <div style="display:flex;align-items:center;gap:7px;padding:2px 0"><span style="width:9px;height:9px;border-radius:50%;background:#9aa3ad"></span>Recce done · <b>${recces.length}</b></div>
        <div style="display:flex;align-items:center;gap:7px;padding:2px 0"><span style="width:9px;height:9px;border-radius:50%;background:#B3261E"></span>Pending · <b>${pendingCount}</b></div>
      </div>
    </div>
    <div class="card" style="margin-top:14px">
      <div style="display:flex;align-items:center;margin-bottom:6px"><b style="font-size:14.5px">Geo-stamped points</b><span style="margin-left:auto;font-size:12px;color:var(--soft)">Tap a row to locate</span></div>
      ${pts.length?pts.slice(0,50).map((p,i)=>`<div class="mpPt" data-i="${i}" style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer"><span style="width:9px;height:9px;border-radius:50%;background:${p.ins?'#FFC400':'#9aa3ad'};flex:0 0 auto"></span><div style="flex:1;min-width:0"><b style="font-size:13px">${esc(p.shop)}</b><br><span style="font-size:11px;color:var(--soft)">${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}${p.city?" · "+esc(p.city):""}${p.sub?" · "+esc(p.sub):""}</span></div><span class="pill" style="background:${p.pill[2]};color:${p.pill[1]}">${p.pill[0]}</span></div>`).join(""):`<div style="color:var(--soft);font-size:13px;padding:10px 0">No geo-stamped points in this period.</div>`}
    </div>`;
  setTimeout(()=>{
    try{ if(_map){ _map.remove(); _map=null; } }catch(e){}
    _map=L.map("leaflet");
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(_map);
    const recceLayer=L.layerGroup(), installLayer=L.layerGroup(), vehLayer=L.layerGroup(), bounds=[];
    recces.forEach(x=>{ L.circleMarker([x.lat,x.lng],{radius:6,color:"#9aa3ad",fillColor:"#9aa3ad",fillOpacity:.85,weight:1})

    installs.forEach(x=>{ L.circleMarker([x.lat,x.lng],{radius:7,color:"#B8890C",fillColor:"#FFC400",fillOpacity:.95,weight:2})
      .bindPopup(`<b>${esc(x.shop)}</b> — ${esc(x.status)}${x.reason?` (${esc(x.reason)})`:""}<br>${esc([x.media,x.size].filter(Boolean).join(" · "))}<br>${esc(x.city)}`).addTo(installLayer); bounds.push([x.lat,x.lng]); });
    vehicles.forEach(v=>{ L.marker([v.lat,v.lng],{icon:L.divIcon({className:'',html:'<div style="font-size:22px;line-height:1">🚗</div>',iconSize:[24,24],iconAnchor:[12,12]})})

    const show=k=>{ [recceLayer,installLayer,vehLayer].forEach(l=>{ try{_map.removeLayer(l);}catch(e){} }); if(k==="all"){ recceLayer.addTo(_map); installLayer.addTo(_map); vehLayer.addTo(_map); } else if(k==="ins") installLayer.addTo(_map); else if(k==="rec") recceLayer.addTo(_map); else if(k==="veh") vehLayer.addTo(_map); };
    const chips=document.querySelectorAll("#mpChips .mpChip");
    chips.forEach(b=>b.onclick=()=>{ chips.forEach(x=>{ x.style.background="var(--card)"; x.style.color="var(--ink)"; }); b.style.background="var(--brand)"; b.style.color="var(--brand-text)"; show(b.dataset.k); });
    if(chips[0]){ chips[0].style.background="var(--brand)"; chips[0].style.color="var(--brand-text)"; }
  },60);
}

  const items=(v.maintItems||[]).map(mi=>({...mi,name:normMaintName(mi.name)}));
  const maintHtml=`

    ${["Service","Repair"].map(cat=>{ const rows=items.filter(mi=>maintCatOf(mi.name)===cat); if(!rows.length) return ""; return `<div style="font-size:11px;color:var(--brand-d);font-weight:800;margin:8px 0 4px;letter-spacing:.3px">${cat==="Service"?"🔧 SERVICE":"🛠️ REPAIR"}</div><div class="tablewrap"><table class="maintTbl"><tr><th>Item</th><th>Used / Interval</th><th>Status</th><th></th></tr>${rows.map(mi=>{ const iv=mi.intervalKm||0, last=mi.lastKm||0, used=iv>0?(last>0?Math.max(0,km-last):km):0, pct=iv>0?Math.round(used*100/iv):0, bw=Math.min(100,pct), bc=pct>=100?"var(--danger)":pct>=85?"var(--brand-d)":"#1B873F";
      return `<tr><td data-label="Item"><b>${esc(mi.name)}</b></td>
        <td data-label="Progress" style="min-width:170px">${iv>0?`<div style="display:flex;align-items:center;gap:7px"><div style="flex:1;height:7px;border-radius:50px;background:#EAEAEA;overflow:hidden"><div style="width:${bw}%;height:100%;background:${bc}"></div></div><span style="font-size:11px;color:var(--soft);font-weight:700;min-width:34px;text-align:right">${pct}%</span></div><div style="font-size:10.5px;color:var(--soft);margin-top:3px">${used.toLocaleString("en-IN")} / ${iv.toLocaleString("en-IN")} km${last>0?` · last @ ${last.toLocaleString("en-IN")}`:" · never"}</div>`:`<span style="color:var(--soft);font-size:12px">no interval set</span>`}</td>
        <td data-label="Status">${dueTxt(mi)}</td>
        <td data-label="Action" style="white-space:nowrap">${iv>0?`<button class="btn vMDone" data-item="${esc(mi.name)}" style="padding:4px 10px;font-size:11.5px;background:#E8F5EC;color:#1B873F;border:none;font-weight:700" title="Quick mark done @ ${km.toLocaleString("en-IN")} km">✓ Done</button> `:""}<button class="btn vMLog" data-item="${esc(mi.name)}" style="padding:4px 9px;font-size:11.5px" title="Open service form pre-filled">📝 Log</button></td>

    <div style="font-size:11.5px;color:var(--soft);margin-bottom:8px">Set the km interval per item for this vehicle.</div>
    ${["Service","Repair"].map(cat=>{ const g=items.map((mi,i)=>({mi,i})).filter(o=>maintCatOf(o.mi.name)===cat); if(!g.length) return ""; return `<div style="font-size:11px;color:var(--brand-d);font-weight:800;margin:10px 0 4px;letter-spacing:.3px">${cat==="Service"?"🔧 SERVICE":"🛠️ REPAIR"}</div><div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr))">${g.map(({mi,i})=>`<div><div style="font-size:11px;color:var(--soft);margin-bottom:3px">${esc(mi.name)} every</div><div style="display:flex;gap:5px"><input type="number" class="mIv" data-i="${i}" value="${mi.intervalKm||""}" style="flex:1;padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-size:12.5px"><button class="mIRm" data-i="${i}" title="Remove item" style="background:#FBEAE5;color:var(--danger);border:none;border-radius:8px;padding:0 9px;cursor:pointer">✕</button></div></div>`).join("")}</div>`; }).join("")}
    <div style="margin-top:14px;border-top:1px solid var(--line);padding-top:12px"><div style="font-size:11px;color:var(--soft);margin-bottom:5px;font-weight:700;letter-spacing:.3px">+ ADD CUSTOM ITEM</div><div style="display:flex;gap:7px;flex-wrap:wrap"><input type="text" id="mNewName" placeholder="Item name (e.g. Spark plug)" style="flex:2;min-width:140px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-size:12.5px"><input type="number" id="mNewKm" placeholder="Interval km" style="width:120px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-size:12.5px"><select id="mNewCat" style="padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-size:12.5px"><option value="Service">Service</option><option value="Repair">Repair</option></select><button class="btn y" id="mAddItem">+ Add</button></div></div>
    <div style="text-align:right;margin-top:14px"><button class="btn y" id="mSave">Save intervals</button></div>`;
  const body = _vTab==="fuel"?fuelHtml : _vTab==="service"?svcHtml : _vTab==="maint"?maintHtml : overviewHtml;
  m.innerHTML=`<div class="modalbox">
    <div style="display:flex;align-items:center;gap:10px"><h3 style="margin:0">🚗 ${esc(v.name||v.number||"Vehicle")}</h3>${ec?`<span style="color:var(--brand-d);font-weight:700">${ec.toFixed(1)} km/l</span>`:""}</div>
    <div style="font-size:12px;color:var(--soft)">${[esc(v.number||""),esc([v.make,v.model].filter(Boolean).join(" ")),esc(fmtYM(v.year)),esc(v.type||""),`${km} km`].filter(Boolean).join(" · ")}</div>
    <div style="font-size:11.5px;color:var(--soft);margin-top:3px">⛽ Mileage — this trip: <b style="color:var(--brand-d)">${tm?tm.toFixed(1)+" km/l":"—"}</b> · lifetime: <b style="color:var(--brand-d)">${ec?ec.toFixed(1)+" km/l":"—"}</b></div>
    <div class="filters" style="margin-top:12px;gap:4px;background:var(--bg);border-radius:50px;padding:3px;display:inline-flex">${tab("overview","Overview")}${tab("fuel","⛽ Fuel log"+(fuelN?` · ${fuelN}`:""))}${tab("service","🔧 Service log"+(svcN?` · ${svcN}`:""))}${tab("maint","🛠 Maintenance")}</div>
    <div style="margin-top:14px">${body}</div>
    <div style="text-align:right;margin-top:14px"><button class="btn" id="vClose">Close</button></div></div>`;
  m.onclick=ev=>{ if(ev.target===m) m.classList.add("hidden"); };
  $("#vClose").onclick=()=>m.classList.add("hidden");
  document.querySelectorAll("#modal .vTab").forEach(b=>b.onclick=()=>{ _vTab=b.dataset.t; openVehicle(v); });
  { const fb=$("#vFuel"); if(fb) fb.onclick=()=>fuelForm(v); }
  { const sb=$("#vSvc"); if(sb) sb.onclick=()=>serviceForm(v); }
  // Per-log delete — fuel / service entry by id.
  m.querySelectorAll(".logDel").forEach(b=>b.onclick=async()=>{
    const kind=b.dataset.kind, id=b.dataset.id; if(!id) return;
    if(!confirm(`Delete this ${kind} entry?`)) return;
    const field=kind==="fuel"?"fuelLogs":"serviceLogs";
    const updated=(v[field]||[]).filter(x=>x.id!==id);
    try{ await setDoc(doc(db,"fleet",v.id),{[field]:updated,updatedAt:Date.now()},{merge:true}); logAudit("vehicle",`Deleted a ${kind} entry for ${v.name||v.number}`); v[field]=updated; openVehicle(v); renderFleet(); }
    catch(e){ alert(e.message||e); }
  });
  m.querySelectorAll(".logEdit").forEach(b=>b.onclick=()=>{ const f=(v.fuelLogs||[]).find(x=>x.id===b.dataset.id); if(f) fuelForm(v,f); });
  m.querySelectorAll(".logEditSvc").forEach(b=>b.onclick=()=>{ const s=(v.serviceLogs||[]).find(x=>x.id===b.dataset.id); if(s) serviceForm(v,s); });
  m.querySelectorAll(".svBill").forEach(b=>b.onclick=async()=>{ try{ const u=await getDownloadURL(ref(storage,b.dataset.p)); window.open(u,"_blank"); }catch(e){ alert("Couldn't open bill: "+(e.message||e)); } });
  // Maintenance tab wiring
  if(_vTab==="maint"){
    m.querySelectorAll(".vMDone").forEach(b=>b.onclick=()=>markMaintDone(v,b.dataset.item));
    m.querySelectorAll(".vMLog").forEach(b=>b.onclick=()=>serviceForm(v,null,b.dataset.item));
    m.querySelectorAll(".mIRm").forEach(b=>b.onclick=()=>{ const i=+b.dataset.i; if(!confirm(`Remove "${items[i].name}" from this vehicle's maintenance list?`)) return; items.splice(i,1); v.maintItems=items; saveMaintItems(v,items); });
    $("#mAddItem").onclick=()=>{ const nm=($("#mNewName").value||"").trim(); const ikm=parseInt($("#mNewKm").value)||0; const cat=$("#mNewCat").value; if(!nm){ alert("Enter item name"); return; } if(!ikm){ alert("Enter interval km"); return; } items.push({name:nm,intervalKm:ikm,lastKm:0}); MAINT_CAT[nm.toLowerCase()]=cat; v.maintItems=items; saveMaintItems(v,items); };
    $("#mSave").onclick=()=>{ document.querySelectorAll("#modal .mIv").forEach(inp=>{ const i=+inp.dataset.i; if(items[i]) items[i].intervalKm=parseInt(inp.value)||0; }); v.maintItems=items; saveMaintItems(v,items); };
  }
}
async function saveMaintItems(v,items){ try{ await setDoc(doc(db,"fleet",v.id),{maintItems:items,updatedAt:Date.now()},{merge:true}); logAudit("vehicle",`Updated maintenance intervals for ${v.name||v.number}`); openVehicle(v); renderFleet(); }catch(e){ alert("Save failed: "+(e.message||e)); } }
// Full-page Add/Edit vehicle form (styled like Project Setup) — replaces the Fleet tab, not a modal.
function vehicleForm(existing){
  const base=existing||{};
  const _dfltMI=FLEET_DEFAULT_MAINT.map(([n,k])=>({name:n,intervalKm:k,lastKm:0}));

  const _defMI=(base.maintItems||[]).find(mi=>(mi.name||"").toLowerCase()==="def");
  // Merge: keep the vehicle's own items, append any default items it's missing (so existing vehicles gain new ones like the filters).
  const items=(((base.maintItems&&base.maintItems.length)?base.maintItems.slice():[]).concat(_dfltMI.filter(d=>!_haveMI.has(d.name.toLowerCase())))).filter(mi=>(mi.name||"").toLowerCase()!=="def");

  try{ $("#modal").classList.add("hidden"); }catch(e){}
  $("#fleet").innerHTML=`
    <div class="filters"><button class="btn" id="vBack">‹ Back to Fleet</button></div>
    <div class="sec">🚗 ${existing?"EDIT VEHICLE":"ADD VEHICLE"}</div>
    <div class="card" style="max-width:820px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div><div class="suLbl">Vehicle number</div><input type="text" id="fNum" class="suInp" placeholder="MH12AB1234" value="${esc(base.number||"")}" style="text-transform:uppercase"></div>
        <div><div class="suLbl">Name / label</div><input type="text" id="fName" class="suInp" placeholder="Activa / Office Car" value="${esc(base.name||"")}"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:14px">
        <div><div class="suLbl">Company / Make</div><input type="text" id="fMake" class="suInp" list="dlMake" placeholder="Tata, Mahindra, Bajaj…" value="${esc(base.make||"")}"><datalist id="dlMake"><option>Tata</option><option>Mahindra</option><option>Maruti Suzuki</option><option>Ashok Leyland</option><option>Eicher</option><option>Force Motors</option><option>Honda</option><option>Bajaj</option><option>Hero</option><option>TVS</option><option>Yamaha</option><option>Royal Enfield</option><option>Suzuki</option><option>Hyundai</option><option>Toyota</option></datalist></div>
        <div><div class="suLbl">Model</div><input type="text" id="fModel" class="suInp" list="dlModel" placeholder="Ace / Veero / Bolero" value="${esc(base.model||"")}"><datalist id="dlModel"><option>Ace</option><option>Ace Gold</option><option>Magic</option><option>Intra</option><option>Bolero</option><option>Veero</option><option>Supro</option><option>Jeeto</option><option>Bolero Pickup</option><option>Pickup</option><option>XUV300</option><option>XUV500</option><option>XUV700</option><option>Scorpio</option><option>Thar</option><option>Eeco</option><option>Alto</option><option>Swift</option><option>Wagon R</option><option>Dost</option><option>Bada Dost</option><option>Partner</option><option>Pro 2049</option><option>Skyline</option><option>Trax</option><option>Traveller</option><option>Activa</option><option>Shine</option><option>Dio</option><option>Pulsar</option><option>Discover</option><option>CT 100</option><option>Platina</option><option>Avenger</option><option>Splendor</option><option>HF Deluxe</option><option>Passion</option><option>Glamour</option><option>Jupiter</option><option>Apache</option><option>Sport</option><option>Star City</option><option>FZ</option><option>R15</option><option>Classic 350</option><option>Bullet</option></datalist></div>
        <div><div class="suLbl">Month &amp; Year</div><input type="month" id="fYear" class="suInp" value="${/^\d{4}-\d{2}$/.test(String(base.year||""))?base.year:(base.year?String(base.year)+"-01":"")}"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px">
        <div><div class="suLbl">Chassis no</div><input type="text" id="fChassis" class="suInp" value="${esc(base.chassis||"")}"></div>
        <div><div class="suLbl">Engine no</div><input type="text" id="fEngine" class="suInp" value="${esc(base.engine||"")}"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px">
        <div><div class="suLbl">Type</div><select id="fType" class="suInp">${FLEET_TYPES.map(t=>`<option ${t===(base.type||"Bike")?"selected":""}>${t}</option>`).join("")}</select></div>
        <div><div class="suLbl">Current odometer (km)</div><input type="number" id="fKm" class="suInp" value="${base.currentKm||""}"></div>
      </div>
      <div style="margin-top:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
        <label style="display:inline-flex;align-items:center;gap:7px;font-size:13.5px;cursor:pointer"><input type="checkbox" id="fDef" ${_defMI?"checked":""}> Uses DEF (AdBlue)</label>

        <span style="margin-left:auto;font-size:11.5px;color:var(--soft)">Service &amp; repair intervals are edited from the vehicle card → <b>🛠 Maintenance</b> tab.</span>
      </div>
      <div class="suLbl" style="margin-top:18px">Documents</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">

        <div><div style="font-size:11px;color:var(--soft);margin-bottom:3px">PUC</div><input type="date" id="fPuc" class="suInp" value="${dval(base.pucExpiry)}"></div>
        <div id="fFitWrap" style="${typeNeedsFitness(base.type||"Bike")?"":"display:none"}"><div style="font-size:11px;color:var(--soft);margin-bottom:3px">Fitness</div><input type="date" id="fFit" class="suInp" value="${dval(base.fitnessExpiry)}"></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px"><button class="btn" id="fCancel">Cancel</button><button class="btn y" id="fSave">${existing?"Save changes":"Add vehicle"}</button></div>
    </div>`;
  $("#vBack").onclick=()=>renderFleet();
  $("#fCancel").onclick=()=>renderFleet();
  $("#fType").onchange=()=>{ const fw=$("#fFitWrap"); if(fw) fw.style.display=typeNeedsFitness($("#fType").value)?"":"none"; };
  $("#fDef").onchange=()=>{ const w=$("#fDefWrap"); if(w) w.style.display=$("#fDef").checked?"flex":"none"; };
  $("#fSave").onclick=async()=>{
    const number=$("#fNum").value.trim().toUpperCase().replace(/\s+/g,""), name=$("#fName").value.trim();

    if(!ok && !confirm(`"${number}" doesn't look like a standard RTO number (e.g. MH12AB1234 or 22BH1234AB). Save anyway?`)) return;

    const hasDef=newItems.some(mi=>(mi.name||"").toLowerCase()==="def");
    if($("#fDef").checked && !hasDef) newItems.push({name:"DEF",intervalKm:parseInt($("#fDefKm").value)||8000,lastKm:_defMI?(_defMI.lastKm||0):0});

    else if(!$("#fDef").checked && hasDef) newItems.splice(newItems.findIndex(mi=>(mi.name||"").toLowerCase()==="def"),1);
    const id=existing?existing.id:fleetRid();

      fuelLogs:base.fuelLogs||[], serviceLogs:base.serviceLogs||[], updatedAt:Date.now() };

  };
}
function fuelForm(v, edit){
  const m=$("#modal"); m.classList.remove("hidden");
  const fd=edit?new Date(edit.date||Date.now()):new Date();
  m.innerHTML=`<div class="modalbox"><h3 style="margin:0 0 4px">${edit?"✏️ Edit fuel":"⛽ Add fuel"} — ${esc(v.name||v.number)}</h3>
    <div style="font-size:12px;color:var(--soft);margin-bottom:8px">Odometer updates km & mileage.</div>
    <div class="filters"><input type="date" id="flDate" value="${fd.toISOString().slice(0,10)}" title="Fuel date (back-date allowed)"><input type="number" id="flOdo" placeholder="Odometer (km)" value="${edit?(edit.odometer||""):(v.currentKm||"")}"><input type="number" id="flLit" step="0.01" max="9999.99" placeholder="Litres" value="${edit?(edit.litres||""):""}"><input type="number" id="flRate" placeholder="₹/Litre" value="${edit?(edit.ratePerLitre||""):""}"><input type="number" id="flAmt" placeholder="Amount ₹" value="${edit?(edit.amount||""):""}"></div>
    <div class="filters" style="margin-top:8px"><select id="flProj" style="flex:1;min-width:180px"><option value="">📁 General / no project</option>${[...new Set((CATALOG.distributors||[]).map(d=>d.name).filter(Boolean))].sort().map(p=>`<option ${edit&&edit.project===p?"selected":""}>${esc(p)}</option>`).join("")}</select></div>
    <div style="font-size:11px;color:var(--soft);margin-top:6px">Enter any two of Litres / ₹ per litre / Amount — the third auto-calculates.</div>
    <div style="text-align:right;margin-top:12px"><button class="btn" id="flCancel">Cancel</button> <button class="btn y" id="flSave">${edit?"Update":"Save"}</button></div></div>`;
  m.onclick=ev=>{ if(ev.target===m) m.classList.add("hidden"); }; $("#flCancel").onclick=()=>m.classList.add("hidden");
  const flCalc=src=>{ const lit=parseFloat($("#flLit").value)||0, rate=parseFloat($("#flRate").value)||0, amt=parseFloat($("#flAmt").value)||0;
    if(src==="amt"){ if(lit>0) $("#flRate").value=(amt/lit).toFixed(2); }
    else if(lit>0&&rate>0){ $("#flAmt").value=Math.round(lit*rate); }
    else if(lit>0&&amt>0){ $("#flRate").value=(amt/lit).toFixed(2); } };

function drawTrail(uid){
  if(!_fleetMap) return;
  _fleetMap.eachLayer(l=>{ if(!(l instanceof L.TileLayer)) _fleetMap.removeLayer(l); });
  if(!uid) return;
  const pts=fRecces().filter(x=>x.uid===uid&&x.lat&&x.lng).sort((a,b)=>a.date-b.date);
  if(!pts.length){ _fleetMap.setView([20.59,78.96],5); return; }
  const latlngs=pts.map(p=>[p.lat,p.lng]);
  L.polyline(latlngs,{color:"#B8890C",weight:3,opacity:.85}).addTo(_fleetMap);
  pts.forEach((p,i)=>{ L.circleMarker([p.lat,p.lng],{radius:6,color:"#1C1C1C",fillColor:"#FFC400",fillOpacity:1,weight:1.5})
    .bindPopup(`<b>${esc(p.shop)}</b><br>${esc(p.city)}<br>${fmtDate(p.date)} · stop ${i+1}`).addTo(_fleetMap); });
  _fleetMap.fitBounds(latlngs,{padding:[30,30],maxZoom:14});
}

function importInstallDialog(projectName, units, onDone){
  const m=$("#modal"); m.classList.remove("hidden");

  $("#iiPick").onclick=()=>$("#iiFile").click();
  $("#iiTpl").onclick=()=>{
    const rows=units.slice(0,Math.min(units.length,20)).map(o=>[o.r.shop||"",o.mi.type||"",sizeStr(o.mi)||"","Approved","Installed",""]);
    if(!rows.length) rows.push(["Sharma Cloth Store","Standee","24×48","Approved","Installed","clean fit"]);
    xlsx("install_template_"+projectName.replace(/[^a-z0-9]+/gi,"_"),["Shop","Media","Size","Approval","Install","Remark"],rows);
  };
  let pendingUpdates=[];
  const norm=s=>(s||"").toString().trim().toLowerCase().replace(/\s+/g," ");
  const validAppr=new Set(INSTALL_APPROVALS.map(a=>a.toLowerCase()));
  const validInst=new Set(INSTALL_STATUS.map(s=>s.toLowerCase()));
  $("#iiFile").onchange=async e=>{

    $("#iiFn").textContent=f.name;
    try{
      const buf=await f.arrayBuffer();
      const wb=XLSX.read(buf,{type:"array"});
      const sh=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(sh,{defval:"",raw:false});
      const matched=[], skipped=[];
      rows.forEach((r,idx)=>{
        const get=keys=>{ for(const k of Object.keys(r)){ const kn=k.trim().toLowerCase(); if(keys.some(x=>kn===x||kn.startsWith(x))) return r[k]; } return ""; };
        const shop=get(["shop","store","outlet"]), media=get(["media","type"]), size=get(["size"]), appr=get(["approval","appr"]), inst=get(["install","status"]), rem=get(["remark","note","comment"]);
        if(!shop){ skipped.push({idx:idx+2,reason:"no shop name",row:r}); return; }
        const nShop=norm(shop), nMedia=norm(media), nSize=norm(size);
        const candidates=units.filter(o=>norm(o.r.shop)===nShop && (!nMedia||norm(o.mi.type)===nMedia));
        const hit = nSize ? (candidates.find(o=>norm(sizeStr(o.mi))===nSize)||candidates[0]) : candidates[0];
        if(!hit){ skipped.push({idx:idx+2,reason:`no recce match for "${shop}"${media?" / "+media:""}${size?" · "+size:""}`,row:r}); return; }
        const fields={};
        if(appr!==""){ const a=String(appr).trim(); if(a==="-"||a==="—"){ fields.approval=""; } else if(validAppr.has(a.toLowerCase())){ fields.approval=INSTALL_APPROVALS.find(x=>x.toLowerCase()===a.toLowerCase()); } else { skipped.push({idx:idx+2,reason:`unknown approval "${a}" (use ${apprOpts})`,row:r}); return; } }
        if(inst!==""){ const i=String(inst).trim(); if(validInst.has(i.toLowerCase())){ fields.install=INSTALL_STATUS.find(x=>x.toLowerCase()===i.toLowerCase()); } else { skipped.push({idx:idx+2,reason:`unknown install "${i}" (use ${instOpts})`,row:r}); return; } }
        if(rem!=="") fields.remark=String(rem).trim();
        if(Object.keys(fields).length===0){ skipped.push({idx:idx+2,reason:"nothing to update (approval/install/remark all blank)",row:r}); return; }
        matched.push({hit,fields,shop,media,size});
      });
      pendingUpdates=matched;
      $("#iiPrev").innerHTML=`<div style="margin-bottom:6px"><b>${matched.length}</b> matched · <b style="color:${skipped.length?'var(--danger)':'var(--soft)'}">${skipped.length}</b> skipped</div>`+
        (matched.length?`<div style="border:1px solid var(--line);border-radius:9px;padding:8px 10px;margin-bottom:8px;max-height:140px;overflow:auto"><div style="font-size:10.5px;font-weight:700;color:var(--soft);margin-bottom:4px">WILL UPDATE</div>${matched.slice(0,30).map(o=>`<div style="padding:3px 0;border-bottom:1px solid var(--line);font-size:11.5px"><b>${esc(o.hit.r.shop)}</b> · ${esc(o.hit.mi.type||"—")}${sizeStr(o.hit.mi)?" · "+esc(sizeStr(o.hit.mi)):""} → ${esc(JSON.stringify(o.fields))}</div>`).join("")}${matched.length>30?`<div style="padding:4px 0;color:var(--soft)">+${matched.length-30} more…</div>`:""}</div>`:"")+
        (skipped.length?`<div style="border:1px solid #E6A6A6;background:#FBECEC;border-radius:9px;padding:8px 10px;max-height:140px;overflow:auto"><div style="font-size:10.5px;font-weight:700;color:#9A2D2D;margin-bottom:4px">SKIPPED</div>${skipped.slice(0,30).map(s=>`<div style="padding:3px 0;font-size:11.5px;color:#9A2D2D">Row ${s.idx}: ${esc(s.reason)}</div>`).join("")}${skipped.length>30?`<div style="padding:4px 0;color:#9A2D2D">+${skipped.length-30} more…</div>`:""}</div>`:"");
      $("#iiApply").disabled = matched.length===0;
    }catch(err){ $("#iiPrev").innerHTML=`<div style="color:var(--danger);font-size:13px">Could not read file: ${esc(err.message||err)}</div>`; pendingUpdates=[]; $("#iiApply").disabled=true; }
  };
  $("#iiApply").onclick=async()=>{
    if(!pendingUpdates.length) return;
    const btn=$("#iiApply"); btn.disabled=true; btn.textContent="Applying…";
    let ok=0, fail=0;
    for(const o of pendingUpdates){
      try{ await setInstall(o.hit.key, o.fields); if(o.fields.approval==="Approved") await pushInstallList(o.hit.r, o.hit.mi, true); ok++; }catch(e){ fail++; }

    m.classList.add("hidden");
    alert(`Imported ✓  ${ok} updated${fail?` · ${fail} failed`:""}.`);
    if(typeof onDone==="function") onDone();
  };
}
// On approve: push the SIZE to the field user's assignments/{uid}.installList so their app pulls it. Un-approve removes it.
async function pushInstallList(rec, mi, approved){
  if(!rec||!rec.uid||!rec.id||!mi) return;
  try{
    const r=doc(db,"assignments",rec.uid), d=await getDoc(r), cur=(d.exists()&&d.data().installList)||[];
    const idx=cur.findIndex(x=>x.recceId===rec.id && (x.mediaIndex||0)===(mi.idx||0));
    if(approved){
      const item={recceId:rec.id,mediaIndex:mi.idx||0,shopId:rec.shopId||"",distributorId:rec.distributorId||"",shopName:rec.shop||"",city:rec.city||"",project:rec.project||"",mediaType:mi.type||"",size:sizeStr(mi),assignedUid:rec.uid};
      if(idx>=0) cur[idx]=item; else cur.push(item);
    } else { if(idx>=0) cur.splice(idx,1); else return; }
    await setDoc(r,{installList:cur,updatedAt:Date.now()},{merge:true});
  }catch(e){ /* non-fatal */ }
}

// Fetch an image URL → base64 data URL (jsPDF needs base64, unlike PptxGenJS which takes a URL).
async function imgToDataURL(url){
  try{ const res=await fetch(url); const blob=await res.blob();
    return await new Promise(rs=>{ const fr=new FileReader(); fr.onload=()=>rs(fr.result); fr.onerror=()=>rs(null); fr.readAsDataURL(blob); });
  }catch(e){ return null; }
}
// POE PDF (landscape) — cover + one page per SIZE (Before | After).

async function saveCatalog(comps,dists){ const now=Date.now(); await setDoc(doc(db,"catalog","companies"),{json:JSON.stringify(comps),updatedAt:now},{merge:true}); await setDoc(doc(db,"catalog","distributors"),{json:JSON.stringify(dists),updatedAt:now},{merge:true}); CATALOG={companies:comps,distributors:dists}; }
async function loadCat(){ let comps=[],dists=[]; try{ const c=await getDoc(doc(db,"catalog","companies")); comps=JSON.parse((c.exists()&&c.data().json)||"[]"); }catch(e){} try{ const d=await getDoc(doc(db,"catalog","distributors")); dists=JSON.parse((d.exists()&&d.data().json)||"[]"); }catch(e){} return {comps,dists}; }

// Rename a distributor + cascade the new name to every field user's local distributors + assignments
// so old recces/shops display under the new name everywhere.
async function renameDistributorDialog(distId){
  if(!distId) return;
  const cd=(CATALOG.distributors||[]).find(x=>x.id===distId); if(!cd){ alert("Distributor not found"); return; }
  const v=prompt(`Rename distributor "${cd.name}" to:`, cd.name);
  if(v===null) return;
  const newName=String(v||"").trim(); if(!newName || newName===cd.name) return;
  if((CATALOG.distributors||[]).some(d=>d.id!==distId && (d.name||"").toLowerCase()===newName.toLowerCase())){ alert(`Another distributor already named "${newName}".`); return; }
  if(!confirm(`Rename "${cd.name}" → "${newName}"?\n\nThis updates every field user's local copy (so old recces / shops show the new name).`)) return;
  const oldName=cd.name;
  try{
    // 1) Catalog rename
    const {comps,dists}=await loadCat();
    const idx=dists.findIndex(d=>d.id===distId); if(idx<0){ alert("Distributor entry missing"); return; }
    dists[idx].name=newName; await saveCatalog(comps,dists);
    // 2) Cascade to each field user's backup/distributors + assignments doc
    let touchedUsers=0;
    for(const s of ((DATA&&DATA.surveyors)||[])){
      let changed=false;
      try{
        const dRef=doc(db,"users",s.uid,"backup","distributors");
        const ds=await getDoc(dRef);
        if(ds.exists()){ let arr=[]; try{arr=JSON.parse(ds.get("json")||"[]");}catch(e){}
          let touched=false; arr.forEach(x=>{ if(x && (x.name||"").toLowerCase()===oldName.toLowerCase()){ x.name=newName; touched=true; } });
          if(touched){ await setDoc(dRef,{json:JSON.stringify(arr),updatedAt:Date.now()},{merge:true}); changed=true; } }
      }catch(e){}
      try{
        const aRef=doc(db,"assignments",s.uid);
        const as=await getDoc(aRef);
        if(as.exists()){ const d=as.data()||{}; let touched=false;
          (d.projects||[]).forEach(p=>{ if((p.name||"").toLowerCase()===oldName.toLowerCase()){ p.name=newName; touched=true; } });
          (d.shops||[]).forEach(sh=>{ if((sh.project||"").toLowerCase()===oldName.toLowerCase()){ sh.project=newName; touched=true; } });
          if(touched){ await setDoc(aRef,{projects:d.projects||[],shops:d.shops||[],updatedAt:Date.now()},{merge:true}); changed=true; } }
      }catch(e){}
      if(changed) touchedUsers++;
    }
    logAudit("setup",`Renamed distributor "${oldName}" → "${newName}" (cascade to ${touchedUsers} field user${touchedUsers===1?"":"s"})`);
    alert(`✓ Renamed "${oldName}" → "${newName}".${touchedUsers?` Updated ${touchedUsers} field user${touchedUsers===1?"":"s"}.`:""} Refreshing data…`);
    load();
  }catch(e){ alert("Rename failed: "+(e.message||e)); }
}

anyName||"",project:dist.name||""}; }).filter(s=>s.name); try{ const r=doc(db,"assignments",uid), d=await getDoc(r), data=(d.exists()&&d.data())||{}; const curS=data.shops||[]; const seen=new Set(curS.map(s=>(s.name||"").toLowerCase()+"|"+(s.project||"").toLowerCase())); const addS=incoming.filter(s=>!seen.has(s.name.toLowerCase()+"|"+(s.project||"").toLowerCase())); await setDoc(r,{shops:[...curS,...addS],updatedAt:Date.now()},{merge:true}); const uname=(($("#imSur").selectedOptions[0]||{}).text)||uid; logAudit("setup",`Imported ${addS.length} shop(s) for ${dist.name} → ${uname}`); m.classList.add("hidden"); alert(`Imported ${addS.length} shop(s) ✓ · will appear in ${uname}'s app after sync.`); }catch(e){ alert("Import failed: "+(e.message||e)); } }; }

// Cascade a distributor rename to every field user's local data (used by Manage Catalog inline rename).
async function cascadeDistRename(oldName,newName){
  if(!oldName||!newName||oldName===newName) return;
  let touched=0;
  for(const s of ((DATA&&DATA.surveyors)||[])){
    let changed=false;
    try{ const dRef=doc(db,"users",s.uid,"backup","distributors"); const ds=await getDoc(dRef); if(ds.exists()){ let arr=[]; try{arr=JSON.parse(ds.get("json")||"[]");}catch(e){} let t=false; arr.forEach(x=>{ if(x&&(x.name||"").toLowerCase()===oldName.toLowerCase()){ x.name=newName; t=true; } }); if(t){ await setDoc(dRef,{json:JSON.stringify(arr),updatedAt:Date.now()},{merge:true}); changed=true; } } }catch(e){}
    try{ const aRef=doc(db,"assignments",s.uid); const as=await getDoc(aRef); if(as.exists()){ const d=as.data()||{}; let t=false; (d.projects||[]).forEach(p=>{ if((p.name||"").toLowerCase()===oldName.toLowerCase()){ p.name=newName; t=true; } }); (d.shops||[]).forEach(sh=>{ if((sh.project||"").toLowerCase()===oldName.toLowerCase()){ sh.project=newName; t=true; } }); if(t){ await setDoc(aRef,{projects:d.projects||[],shops:d.shops||[],updatedAt:Date.now()},{merge:true}); changed=true; } } }catch(e){}
    if(changed) touched++;
  }
  logAudit("setup",`Renamed distributor "${oldName}" → "${newName}" (cascade to ${touched} field user${touched===1?"":"s"})`);
}
// Upserts a company (+creatives/media) and distributor into the shared `catalog` so every app pulls them.
async function upsertCatalog(company, creatives, mediaTypes, projName, city, contact){
  if(!company) return;
  try{
    const cRef=doc(db,"catalog","companies"), dRef=doc(db,"catalog","distributors");
    const cD=await getDoc(cRef), dD=await getDoc(dRef);
    let comps=[]; try{ comps=JSON.parse((cD.exists()&&cD.data().json)||"[]"); }catch(e){}
    let dists=[]; try{ dists=JSON.parse((dD.exists()&&dD.data().json)||"[]"); }catch(e){}
    let comp=comps.find(c=>(c.name||"").trim().toLowerCase()===company.trim().toLowerCase());
    if(!comp){ comp={id:fleetRid(),name:company.trim(),creatives:creatives||[],mediaTypes:mediaTypes||[],userId:"",createdAt:Date.now()}; comps.push(comp); }
    else { comp.creatives=[...new Set([...(comp.creatives||[]),...(creatives||[])])]; comp.mediaTypes=[...new Set([...(comp.mediaTypes||[]),...(mediaTypes||[])])]; }
    if(projName){ let dist=dists.find(d=>(d.name||"").trim().toLowerCase()===projName.trim().toLowerCase());
      if(!dist){ dists.push({id:fleetRid(),name:projName.trim(),city:city||"",contact:contact||"",companyId:comp.id,companyName:comp.name,userId:"",createdAt:Date.now()}); }
      else { if(city)dist.city=city; if(contact)dist.contact=contact; dist.companyId=comp.id; dist.companyName=comp.name; } }
    const now=Date.now();
    await setDoc(cRef,{json:JSON.stringify(comps),updatedAt:now},{merge:true});
    await setDoc(dRef,{json:JSON.stringify(dists),updatedAt:now},{merge:true});
  }catch(e){ /* non-fatal */ }
}
async function doSetupAssign(){
  const uid=$("#suSur").value;  // optional — empty = save to shared catalog only
  const company=$("#suComp").value.trim(); if(!company){ alert("① Enter a company name"); return; }
  const creatives=$("#suCre").value.split(",").map(x=>x.trim()).filter(Boolean);
  const mediaTypes=$("#suMed").value.split(",").map(x=>x.trim()).filter(Boolean);
  const name=$("#suProj").value.trim(), city=$("#suCity").value.trim(), contact=$("#suContact").value.replace(/\D/g,"").slice(0,10);
  const setup={company,creatives,mediaTypes,name,city,contact};
  const lines=$("#suShops").value.split("\n").map(l=>l.trim()).filter(Boolean);
  if(lines.length && !uid){ alert("Shops need a field user — pick one in 'Assign to', or clear the shops to save without assigning."); return; }
  if(lines.length && !name){ alert("④ Enter a project name for the shops"); return; }
  const incoming=lines.map(l=>{ const p=l.split(",").map(x=>x.trim()); return {id:rid(),name:p[0]||"",city:p[1]||"",contact:(p[2]||"").replace(/\D/g,"").slice(0,10),company,project:name}; }).filter(s=>s.name);
  try{
    if(uid){
      const r=doc(db,"assignments",uid), d=await getDoc(r), data=(d.exists()&&d.data())||{};
      const curP=data.projects||[], curS=data.shops||[];
      const pi=curP.findIndex(p=>(p.company||"").toLowerCase()===company.toLowerCase()&&(p.name||"").toLowerCase()===name.toLowerCase());
      if(pi>=0) curP[pi]=setup; else curP.push(setup);
      const seen=new Set(curS.map(s=>(s.name||"").toLowerCase()+"|"+(s.project||"").toLowerCase()));
      const addS=incoming.filter(s=>!seen.has(s.name.toLowerCase()+"|"+(s.project||"").toLowerCase()));
      await setDoc(r,{projects:curP,shops:[...curS,...addS],updatedAt:Date.now()},{merge:true});
      await upsertCatalog(company, creatives, mediaTypes, name, city, contact);
      const uname=(($("#suSur").selectedOptions[0]||{}).text)||uid;
      logAudit("setup",`Setup "${company}${name?" / "+name:""}"`+(addS.length?` + ${addS.length} shop(s)`:"")+` for ${uname}`);
      $("#suShops").value="";
      alert(`Saved ✓  Setup${addS.length?` + ${addS.length} shop(s)`:""} will appear in ${uname}'s app after it syncs.`);
      drawCurrent(uid);
    } else {
      await upsertCatalog(company, creatives, mediaTypes, name, city, contact);
      logAudit("setup",`Added "${company}${name?" / "+name:""}"`);
      alert(`Saved ✓  "${name||company}" is now available to assign to any field user — open "📌 Assign to a field user" below.`);
      renderSetup();
    }
  }catch(e){ alert("Could not save: "+(e.message||e)); }
}

  el.innerHTML=`<div class="loading">Loading…</div>`;
  try{ const d=await getDoc(doc(db,"assignments",uid)); const data=(d.exists()&&d.data())||{}; const ps=data.projects||[], shp=data.shops||[];
    el.innerHTML=`
      <div style="font-weight:700;font-size:11px;letter-spacing:.5px;color:var(--soft);margin-bottom:7px">PROJECT SETUPS</div>
      ${ps.length?`<div style="overflow:auto"><table style="margin-bottom:16px"><tr><th>Company</th><th>Project</th><th>Creatives</th><th>Sizes</th></tr>${ps.map(p=>`<tr><td><b>${esc(p.company||"")}</b></td><td>${esc(p.name||"—")}${p.city?`<br><span style="color:var(--soft);font-size:11px">${esc(p.city)}</span>`:""}</td><td class="wrap">${esc((p.creatives||[]).join(", "))||"—"}</td><td>${esc((p.mediaTypes||[]).join(", "))||"—"}</td></tr>`).join("")}</table></div>`:`<div style="color:var(--soft);font-size:13px;margin-bottom:16px">No setups yet.</div>`}
      <div style="font-weight:700;font-size:11px;letter-spacing:.5px;color:var(--soft);margin-bottom:7px">ASSIGNED SHOPS</div>
      ${shp.length?`<div style="overflow:auto"><table><tr><th>Shop</th><th>City</th><th>Project</th><th></th></tr>${shp.map(s=>`<tr><td><b>${esc(s.name)}</b></td><td>${esc(s.city||"")}</td><td>${esc(s.project||"")}</td><td><button class="btn" data-id="${esc(s.id)}" style="background:#fdecec;color:#a3302a;border:none">Remove</button></td></tr>`).join("")}</table></div>`:`<div style="color:var(--soft);font-size:13px">No shops assigned yet.</div>`}`;
    el.querySelectorAll("button[data-id]").forEach(b=>b.onclick=async()=>{ const dd=await getDoc(doc(db,"assignments",uid)), cur=(dd.exists()&&dd.data().shops)||[]; await setDoc(doc(db,"assignments",uid),{shops:cur.filter(x=>x.id!==b.dataset.id),updatedAt:Date.now()},{merge:true}); drawCurrent(uid); });
  }catch(e){ el.innerHTML=`<div class="loading">Error: ${esc(e.message||e)}</div>`; }
}

// ── Assign (admin/manager) — push shops to a field user's app ──
const rid=()=>Math.random().toString(36).slice(2,10);
function renderAssign(){
  const surs=(DATA&&DATA.surveyors)||[];
  $("#assign").innerHTML=`
    <div class="sec">ASSIGN SHOPS — pick a field user + project, add shops. They appear in their app (Pending) after it syncs.</div>
    <div class="card">
      <div class="filters"><select id="aSur" style="min-width:220px"><option value="">Select field user…</option>${surs.map(s=>`<option value="${esc(s.uid)}">${esc(s.name)}</option>`).join("")}</select></div>
      <div class="filters">
        <input type="text" id="aComp" list="compList" placeholder="Company (pick or type)">
        <input type="text" id="aProj" list="projList" placeholder="Project / distributor (pick or type)">
      </div>
      <datalist id="compList">${((DATA&&DATA.companies)||[]).map(c=>`<option value="${esc(c)}"></option>`).join("")}</datalist>
      <datalist id="projList">${((DATA&&DATA.projects)||[]).map(p=>`<option value="${esc(p)}"></option>`).join("")}</datalist>
      <textarea id="aShops" placeholder="One shop per line:&#10;Ramesh Store, Jalgaon, 9876543210&#10;Shree Garments, Bhusawal" style="width:100%;min-height:110px;padding:10px;border:1px solid var(--line);border-radius:9px;font-size:13px;font-family:inherit"></textarea>
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <input type="file" id="aFile" accept=".csv,.txt,text/csv,text/plain" style="display:none">
        <button class="btn" id="aPick">Import from CSV / file</button>
        <button class="btn y" id="aGo">Assign shops</button>
      </div>
    </div>
    <div class="sec">CURRENT ASSIGNMENTS</div>
    <div id="aList" class="card"><div class="loading">Select a field user to see / manage their assigned shops.</div></div>`;
  $("#aSur").onchange=()=>drawAssignments($("#aSur").value);
  $("#aPick").onclick=()=>$("#aFile").click();
  $("#aFile").onchange=e=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader();
    r.onload=()=>{ const t=$("#aShops"); t.value=(t.value.trim()?t.value.trim()+"\n":"")+String(r.result||"").trim(); }; r.readAsText(f); };
  $("#aGo").onclick=doAssign;
}
async function doAssign(){
  const uid=$("#aSur").value; if(!uid){ alert("Select a field user"); return; }
  const company=$("#aComp").value.trim(), project=$("#aProj").value.trim();
  if(!project){ alert("Enter a project / distributor name"); return; }
  const lines=$("#aShops").value.split("\n").map(l=>l.trim()).filter(Boolean);
  if(!lines.length){ alert("Add at least one shop (one per line)"); return; }
  const incoming=lines.map(l=>{ const p=l.split(",").map(x=>x.trim());
    return {id:rid(),name:p[0]||"",city:p[1]||"",contact:(p[2]||"").replace(/\D/g,"").slice(0,10),company,project}; }).filter(s=>s.name);
  try{
    const r=doc(db,"assignments",uid), d=await getDoc(r), cur=(d.exists()&&d.data().shops)||[];
    const seen=new Set(cur.map(s=>(s.name||"").toLowerCase()+"|"+(s.project||"").toLowerCase()));
    const add=incoming.filter(s=>!seen.has(s.name.toLowerCase()+"|"+s.project.toLowerCase()));
    await setDoc(r,{shops:[...cur,...add],updatedAt:Date.now()},{merge:true});
    const sName=(($("#aSur").selectedOptions[0]||{}).text)||uid;
    logAudit("assign",`Assigned ${add.length} shop(s) to ${sName}${project?" ("+project+")":""}`);
    $("#aShops").value="";
    alert(`Assigned ${add.length} shop(s). They'll show in the field user's app after it syncs.`);
    drawAssignments(uid);
  }catch(e){ alert("Could not assign: "+(e.message||e)); }
}
async function drawAssignments(uid){
  const el=$("#aList"); if(!uid){ el.innerHTML=`<div class="loading">Select a field user…</div>`; return; }
  el.innerHTML=`<div class="loading">Loading…</div>`;
  try{
    const d=await getDoc(doc(db,"assignments",uid)), list=(d.exists()&&d.data().shops)||[];
    el.innerHTML = list.length ? `<table><tr><th>Shop</th><th>City</th><th>Project</th><th></th></tr>`+
      list.map(s=>`<tr><td><b>${esc(s.name)}</b></td><td>${esc(s.city)}</td><td>${esc(s.project)}</td>
        <td><button class="btn" data-id="${esc(s.id)}" style="background:#fdecec;color:#a3302a">Remove</button></td></tr>`).join("")+`</table>`
      : `<div class="loading">No assignments yet for this field user.</div>`;
    el.querySelectorAll("button[data-id]").forEach(b=>b.onclick=async()=>{
      const dd=await getDoc(doc(db,"assignments",uid)), cur=(dd.exists()&&dd.data().shops)||[];
      await setDoc(doc(db,"assignments",uid),{shops:cur.filter(x=>x.id!==b.dataset.id),updatedAt:Date.now()},{merge:true}); drawAssignments(uid);
    });
  }catch(e){ el.innerHTML=`<div class="loading">Error: ${esc(e.message||e)}</div>`; }
}

// ── Exports ──
function csv(name,headers,rows){
  const cell=v=>`"${String(v==null?"":v).replace(/"/g,'""')}"`;
  const body=[headers.map(cell).join(","),...rows.map(r=>r.map(cell).join(","))].join("\r\n");
  dl(new Blob(["﻿"+body],{type:"text/csv;charset=utf-8"}), `RGS_${name}_${today()}.csv`);
}
function xlsx(name,headers,rows){
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]); const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,name); XLSX.writeFile(wb,`RGS_${name}_${today()}.xlsx`);
}
function pdf(title,headers,rows){
  const d=new window.jspdf.jsPDF({orientation:"landscape"});
  d.setFontSize(14); d.text(`RGS — ${title}`,14,14);
  d.autoTable({head:[headers],body:rows,startY:20,styles:{fontSize:8},headStyles:{fillColor:[255,196,0],textColor:20}});
  d.save(`RGS_${title}_${today()}.pdf`);
}
function dl(blob,name){ const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name; a.click(); }
</script>
